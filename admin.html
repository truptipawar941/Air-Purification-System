<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gaugeJS/dist/gauge.min.js"></script>

<style>
body {
  background: linear-gradient(135deg,#1e293b,#334155);
  color:white;
}
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  padding:20px;
}
</style>
</head>

<body>

<div class="p-6">

<h1 class="text-3xl font-bold mb-6">Admin Dashboard</h1>

<!-- GAUGES GRID -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

<!-- TEMP -->
<div class="card text-center">
<h2>Temperature</h2>
<canvas id="tempGauge"></canvas>
<p id="tempValue" class="mt-2 text-xl"></p>
</div>

<!-- HUM -->
<div class="card text-center">
<h2>Humidity</h2>
<canvas id="humGauge"></canvas>
<p id="humValue" class="mt-2 text-xl"></p>
</div>

<!-- MQ -->
<div class="card text-center">
<h2>MQ Gas</h2>
<canvas id="mqGauge"></canvas>
<p id="mqValue" class="mt-2 text-xl"></p>
</div>

<!-- AQI -->
<div class="card text-center">
<h2>AQI</h2>
<canvas id="aqiGauge"></canvas>
<p id="aqiValue" class="mt-2 text-xl"></p>
</div>

<!-- Fan Status Display -->
<div class="card text-center mt-4">
<h2 class="text-2xl font-bold mb-4">🌬 Fan Control</h2>
<div class="flex justify-center items-center space-x-6">
  <div class="text-center p-4 rounded-lg border-2" id="fanStatusContainer">
    <p id="fanStatus" class="text-4xl font-bold mb-2">OFF</p>
    <p class="text-sm text-gray-600">Fan Status</p>
    <div id="fanIndicator" class="mt-3 w-8 h-8 mx-auto rounded-full bg-red-500 flex items-center justify-center">
      <span class="text-white text-2xl">⏸</span>
    </div>
  </div>
  <div class="text-center p-4 rounded-lg border-2">
    <p id="aqiLevel" class="text-4xl font-bold mb-2">--</p>
    <p class="text-sm text-gray-600">AQI Level</p>
  </div>
</div>
<div class="mt-4 text-center">
  <p id="aqiDescription" class="text-sm bg-gray-100 p-3 rounded-lg">Waiting for data...</p>
</div>

<!-- Last Updated Display -->
<div class="card text-center mt-4">
<p id="lastUpdated" class="text-lg font-semibold">Loading...</p>
</div>

</div>

</div>

<script>

// -------- CREATE GAUGES --------
function createGauge(id, max){
  console.log("Creating gauge for:", id); // Debug
  
  let target = document.getElementById(id);
  if (!target) {
    console.error("Canvas element not found:", id);
    return null;
  }
  
  let opts = {
    angle: -0.2,
    lineWidth: 0.2,
    radiusScale: 1,
    pointer: {
      length: 0.6,
      strokeWidth: 0.035,
      color: '#ffffff'
    },
    limitMax: false,
    limitMin: false,
    colorStart: '#10b981',
    colorStop: '#ef4444',
    strokeColor: '#ffffff',
    generateGradient: true,
    highDpiSupport: true,
    staticZones: [
      {strokeStyle: "#10b981", min: 0, max: max*0.6},
      {strokeStyle: "#f59e0b", min: max*0.6, max: max*0.8},
      {strokeStyle: "#ef4444", min: max*0.8, max: max}
    ],
    staticLabels: {
      font: "12px Inter",
      labels: [0, Math.round(max*0.25), Math.round(max*0.5), Math.round(max*0.75), max],
      color: "#ffffff",
      fractionDigits: 0
    }
  };

  try {
    let gauge = new Gauge(target).setOptions(opts);
    gauge.maxValue = max;
    gauge.setMinValue(0);
    gauge.animationSpeed = 32;
    gauge.set(0);
    
    console.log("Gauge created successfully:", id); // Debug
    return gauge;
  } catch (error) {
    console.error("Error creating gauge:", id, error);
    return null;
  }
}

// Test gauge creation
console.log("Starting gauge creation...");

let tempGauge = createGauge("tempGauge",50);
let humGauge = createGauge("humGauge",100);
let mqGauge = createGauge("mqGauge",500);
let aqiGauge = createGauge("aqiGauge",500);

console.log("Gauges created:", {tempGauge, humGauge, mqGauge, aqiGauge});

// -------- FETCH DATA --------
async function loadData(){
  try {
    // Add timestamp to prevent caching
    const timestamp = new Date().getTime();
    const response = await fetch("http://192.168.137.1:8000/api/data.php?t=" + timestamp);
    const data = await response.json();
    
    console.log("API Response:", data); // Debug log

    // Check if data is valid
    if (!data || data.status !== "ok") {
      console.error("Invalid data format:", data);
      return;
    }

    // Extract sensor data from data.php response
    let received = data.received;
    console.log("Received data:", received); // Debug log

    if (!received) {
      console.error("No received data found");
      return;
    }

    let t = parseFloat(received.temperature);
    let h = parseFloat(received.humidity);
    let mq = parseFloat(received.mq);
    let aqi = parseFloat(received.aqi);

    console.log("Parsed values:", {t, h, mq, aqi}); // Debug log

    // Check if values are valid numbers
    if (isNaN(t) || isNaN(h) || isNaN(mq) || isNaN(aqi)) {
      console.error("Invalid sensor values:", {t, h, mq, aqi});
      return;
    }

    // Update gauges with delay and force redraw
    setTimeout(() => {
      if (tempGauge) {
        tempGauge.set(t);
        console.log("Temperature gauge set to:", t);
      }
      if (humGauge) {
        humGauge.set(h);
        console.log("Humidity gauge set to:", h);
      }
      if (mqGauge) {
        mqGauge.set(mq);
        console.log("MQ gauge set to:", mq);
      }
      if (aqiGauge) {
        aqiGauge.set(aqi);
        console.log("AQI gauge set to:", aqi);
      }
    }, 100);

    // Update text values
    document.getElementById("tempValue").innerText = t + " °C";
    document.getElementById("humValue").innerText = h + " %";
    document.getElementById("mqValue").innerText = mq;
    document.getElementById("aqiValue").innerText = aqi;

    // Update fan status and AQI level
    const fanStatus = received.fan_status || 'OFF';
    const aqiLevel = received.aqi_level || 'Good';
    
    document.getElementById("fanStatus").innerText = fanStatus;
    document.getElementById("aqiLevel").innerText = aqiLevel;
    
    // Update fan status color and indicator
    const fanElement = document.getElementById("fanStatus");
    const fanIndicator = document.getElementById("fanIndicator");
    const fanContainer = document.getElementById("fanStatusContainer");
    
    if (fanStatus === 'ON') {
      fanElement.style.color = '#10b981'; // Green
      fanIndicator.className = 'mt-3 w-8 h-8 mx-auto rounded-full bg-green-500 flex items-center justify-center';
      fanIndicator.innerHTML = '<span class="text-white text-2xl">▶</span>';
      fanContainer.className = 'text-center p-4 rounded-lg border-2 border-green-500 bg-green-50';
    } else {
      fanElement.style.color = '#ef4444'; // Red
      fanIndicator.className = 'mt-3 w-8 h-8 mx-auto rounded-full bg-red-500 flex items-center justify-center';
      fanIndicator.innerHTML = '<span class="text-white text-2xl">⏸</span>';
      fanContainer.className = 'text-center p-4 rounded-lg border-2 border-red-500 bg-red-50';
    }
    
    // Update AQI level color coding
    const aqiElement = document.getElementById("aqiLevel");
    if (aqiLevel === 'Good') {
      aqiElement.style.color = '#10b981'; // Green
    } else if (aqiLevel === 'Moderate') {
      aqiElement.style.color = '#f59e0b'; // Yellow
    } else if (aqiLevel.includes('Unhealthy')) {
      aqiElement.style.color = '#ef4444'; // Red
    } else {
      aqiElement.style.color = '#7c3aed'; // Purple
    }
    
    // AQI description
    const aqiDescriptions = {
      'Good': 'Air quality is satisfactory. Enjoy outdoor activities.',
      'Moderate': 'Air quality is acceptable for most people.',
      'Unhealthy for Sensitive': 'Sensitive groups may experience health effects.',
      'Unhealthy': 'Everyone may begin to experience health effects.',
      'Very Unhealthy': 'Health warnings of emergency conditions.',
      'Hazardous': 'Emergency conditions affecting entire population.'
    };
    
    document.getElementById("aqiDescription").innerText = aqiDescriptions[aqiLevel] || 'Air quality monitoring...';

    console.log("Text values updated:", {t, h, mq, aqi, fanStatus, aqiLevel});

    // Update last updated time
    const now = new Date();
    const timeString = now.toLocaleTimeString();
    document.getElementById("lastUpdated").innerText = "Last updated: " + timeString;
    console.log("Dashboard updated at:", timeString);

  } catch (error) {
    console.error("Error loading data:", error);
  }
}

// -------- AUTO REFRESH --------
setInterval(loadData,2000);
loadData();

</script>

</body>
</html>
